<!DOCTYPE html>

<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title id="pageTitle">لعبة الصور</title>

<link rel="stylesheet" href="css/bootstrap.min.css">

<style>
body { 
    background:#f8f9fa; 
    font-family: 'Segoe UI', Tahoma, sans-serif;
}

.navbar {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
}

.game-img {
    width:100%;
    max-width:300px;
    aspect-ratio:1/1;
    object-fit:contain;
    background:#fff;
    padding:10px;
    border-radius:15px;
    margin:auto;
    display:block;
}

.correct-anim { animation: pop 0.4s; }
@keyframes pop { from{transform:scale(0.7);} to{transform:scale(1);} }

.shake { animation: shake 0.4s; }
@keyframes shake {
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}

.glow { box-shadow:0 0 15px lime; }

.choice { width:100%; }
</style>

</head>

<body>

<nav class="navbar navbar-dark px-3 shadow">
    <span id="navTitle" class="navbar-brand fw-bold">🖼️ لعبة تخمين الصور</span>
    <button id="backTop" class="btn btn-light btn-sm" onclick="goBack()">⬅</button>
</nav>

<div class="container py-4">
<div class="card shadow p-3">

<h4 id="gameTitle" class="text-center mb-3">🎮 لعبة تخمين الصور</h4>

<select id="gameLang" class="form-select mb-2">
<option value="ar">العربية</option>
<option value="fr">Français</option>
<option value="en">English</option>
<option value="nl">Nederlands</option>
<option value="de">Deutsch</option>
</select>

<select id="difficulty" class="form-select mb-2">
<option value="easy">سهل</option>
<option value="medium">متوسط</option>
<option value="hard">صعب</option>
</select>

<button id="startBtn" class="btn btn-success w-100 mb-3" onclick="startGame()">ابدأ ▶</button>

<p id="score" class="text-center fw-bold">النقاط: 0</p>
<p id="level" class="text-center text-primary fw-bold">Level: 1</p>

<img id="image" class="game-img mb-2">

<p id="hint" class="text-center text-muted"></p>

<div id="choices" class="d-grid gap-2"></div>

<p id="result" class="text-center fw-bold"></p>

<button id="nextBtn" class="btn btn-info w-100 mt-2 d-none"
onclick="startGame()">السؤال التالي ▶</button>

<button id="backBtn" class="btn btn-outline-secondary w-100 mt-3" onclick="goBack()">⬅ الرجوع</button>

</div>
</div>

<script src="data.js"></script>

<script>

// 🔥 منع الدخول المباشر (الإضافة الوحيدة)
if(!sessionStorage.getItem("fromIndex")){
    window.location.href = "index.html";
}

// 🌍 ترجمة كاملة (واجهة + نتائج)
const uiText = {

ar:{
title:"🖼️ لعبة تخمين الصور",
game:"🎮 لعبة تخمين الصور",
start:"ابدأ ▶",
next:"السؤال التالي ▶",
back:"⬅ الرجوع",
score:"النقاط",
easy:"سهل",
medium:"متوسط",
hard:"صعب",
correct:"✅ صحيح!",
wrong:"❌ خطأ!"
},

fr:{
title:"🖼️ Jeu d'images",
game:"🎮 Jeu d'images",
start:"Commencer ▶",
next:"Suivant ▶",
back:"⬅ Retour",
score:"Score",
easy:"Facile",
medium:"Moyen",
hard:"Difficile",
correct:"✅ Correct!",
wrong:"❌ Faux!"
},

en:{
title:"🖼️ Image Game",
game:"🎮 Image Game",
start:"Start ▶",
next:"Next ▶",
back:"⬅ Back",
score:"Score",
easy:"Easy",
medium:"Medium",
hard:"Hard",
correct:"✅ Correct!",
wrong:"❌ Wrong!"
},

nl:{
title:"🖼️ Afbeeldingen spel",
game:"🎮 Afbeeldingen spel",
start:"Start ▶",
next:"Volgende ▶",
back:"⬅ Terug",
score:"Score",
easy:"Makkelijk",
medium:"Gemiddeld",
hard:"Moeilijk",
correct:"✅ Correct!",
wrong:"❌ Fout!"
},

de:{
title:"🖼️ Bilderspiel",
game:"🎮 Bilderspiel",
start:"Start ▶",
next:"Weiter ▶",
back:"⬅ Zurück",
score:"Punkte",
easy:"Einfach",
medium:"Mittel",
hard:"Schwer",
correct:"✅ Richtig!",
wrong:"❌ Falsch!"
}

};

// 🔥 تطبيق اللغة
function applyUILanguage(){

    let lang = localStorage.getItem("lang") || "ar";
    let t = uiText[lang] || uiText.ar;

    document.documentElement.lang = lang;
    document.body.dir = (lang==="ar") ? "rtl" : "ltr";

    document.getElementById("navTitle").innerText = t.title;
    document.getElementById("gameTitle").innerText = t.game;
    document.getElementById("startBtn").innerText = t.start;
    document.getElementById("nextBtn").innerText = t.next;
    document.getElementById("backBtn").innerText = t.back;
    document.getElementById("backTop").innerText = t.back;

    document.getElementById("score").innerText = t.score + ": " + score;

    document.title = t.title;

    let diff = document.getElementById("difficulty");
    diff.options[0].text = t.easy;
    diff.options[1].text = t.medium;
    diff.options[2].text = t.hard;
}

// 🔊 أصوات
let correctSound = new Audio("sounds/correct.mp3");
let wrongSound = new Audio("sounds/wrong.mp3");

let data = imagesData;
let current;
let correctAnswer;

let score = parseInt(localStorage.getItem("score")) || 0;
let level = parseInt(localStorage.getItem("level")) || 1;

let gameLang = localStorage.getItem("gameLang") || localStorage.getItem("lang") || "ar";

window.onload = () => {
    document.getElementById("gameLang").value = gameLang;
    updateScore();
    applyUILanguage();
};

document.getElementById("gameLang").onchange = function(){
    gameLang = this.value;
    localStorage.setItem("gameLang", gameLang);
};

// الصور
function loadImage(file){
    let img = document.getElementById("image");
    let base = "images/";

    img.src = base + file;

    img.onerror = function(){
        if(file.endsWith(".jpg")){
            img.src = base + file.replace(".jpg",".JPG");
        }else{
            img.src = base + file.replace(".JPG",".jpg");
        }
    };
}

// اللعبة
function startGame(){

    let difficulty = document.getElementById("difficulty").value;

    current = data[Math.floor(Math.random()*data.length)];

    loadImage(current.file);

    correctAnswer=current.answers[gameLang]||"";

    let count = 3;
    if(difficulty==="medium") count=4;
    if(difficulty==="hard") count=6;

    generateChoices(gameLang, count);

    document.getElementById("hint").innerText =
        "عدد الحروف: "+correctAnswer.length;

    document.getElementById("result").innerText="";
    document.getElementById("nextBtn").classList.add("d-none");
}

function generateChoices(lang, count){

    let div=document.getElementById("choices");
    div.innerHTML="";

    let answers=[correctAnswer];

    while(answers.length < count){
        let r=data[Math.floor(Math.random()*data.length)].answers[lang];
        if(r && !answers.includes(r)) answers.push(r);
    }

    answers.sort(()=>Math.random()-0.5);

    answers.forEach(a=>{
        let btn=document.createElement("button");
        btn.className="btn btn-outline-primary choice";
        btn.innerText=a;
        btn.onclick=()=>checkAnswer(a);
        div.appendChild(btn);
    });
}

// 🔥 تم تعديل هذه الدالة فقط
function checkAnswer(selected){

    let lang = localStorage.getItem("lang") || "ar";
    let t = uiText[lang];

    let result=document.getElementById("result");
    let buttons=document.querySelectorAll(".choice");

    buttons.forEach(btn=>{
        btn.disabled=true;

        if(btn.innerText===correctAnswer){
            btn.classList.add("btn-success","glow","correct-anim");
        }

        if(btn.innerText===selected && selected!==correctAnswer){
            btn.classList.add("btn-danger","shake");
        }
    });

    if(selected===correctAnswer){
        result.innerText = t.correct;
        score++;
        correctSound.play();
        if(score % 5 === 0) level++;
    }else{
        result.innerText = t.wrong;
        wrongSound.play();
    }

    localStorage.setItem("score", score);
    localStorage.setItem("level", level);

    updateScore();
    applyUILanguage();

    document.getElementById("nextBtn").classList.remove("d-none");
}

function updateScore(){
    document.getElementById("score").innerText="النقاط: "+score;
    document.getElementById("level").innerText="Level: "+level;
}

function goBack(){
    window.location.href="index.html";
}

</script>

</body>
</html>
