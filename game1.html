<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة الصور</title>

<link rel="stylesheet" href="css/bootstrap.min.css">

<style>
body { 
    background:#f8f9fa; 
    font-family: 'Segoe UI', Tahoma, sans-serif;
}

/* Navbar */
.navbar {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
}

/* صورة */
.game-img {
    width:100%;
    max-width:300px;
    aspect-ratio:1/1;
    object-fit:contain;
    background:#fff;
    padding:10px;
    border-radius:15px;
    margin:auto;
    display:block;
}

/* تأثيرات */
.correct-anim { animation: pop 0.4s; }
@keyframes pop { from{transform:scale(0.7);} to{transform:scale(1);} }

.shake { animation: shake 0.4s; }
@keyframes shake {
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}

.glow { box-shadow:0 0 15px lime; }

.choice { width:100%; }
</style>
</head>

<body>

<!-- ✅ Navbar رجعناه -->
<nav class="navbar navbar-dark px-3 shadow">
    <span class="navbar-brand fw-bold">🖼️ لعبة تخمين الصور</span>
    <button class="btn btn-light btn-sm" onclick="goBack()">⬅</button>
</nav>

<div class="container py-4">
<div class="card shadow p-3">

<h4 class="text-center mb-3">🎮 لعبة تخمين الصور</h4>

<!-- ✅ مستوى -->
<select id="difficulty" class="form-select mb-2">
<option value="easy">سهل</option>
<option value="medium">متوسط</option>
<option value="hard">صعب</option>
</select>

<button class="btn btn-success w-100 mb-3" onclick="startGame()">ابدأ ▶</button>

<p id="score" class="text-center fw-bold">النقاط: 0</p>
<p id="level" class="text-center text-primary fw-bold">Level: 1</p>

<img id="image" class="game-img mb-2">

<p id="hint" class="text-center text-muted"></p>

<div id="choices" class="d-grid gap-2"></div>

<p id="result" class="text-center fw-bold"></p>

<button id="nextBtn" class="btn btn-info w-100 mt-2 d-none"
onclick="startGame()">السؤال التالي ▶</button>

<!-- ✅ زر رجوع -->
<button class="btn btn-outline-secondary w-100 mt-3" onclick="goBack()">⬅ الرجوع</button>

</div>
</div>

<script src="data.js"></script>

<script>

// 🔊 أصوات
let correctSound = new Audio("sounds/correct.mp3");
let wrongSound = new Audio("sounds/wrong.mp3");

// 🎯 بيانات
let data = imagesData;
let current;
let correctAnswer;

// 💾 نقاط
let score = parseInt(localStorage.getItem("score")) || 0;
let level = parseInt(localStorage.getItem("level")) || 1;

updateScore();

// ✅ حل مشكلة الصور (JPG / jpg)
function loadImage(file){
    let img = document.getElementById("image");
    let base = "images/";

    img.src = base + file;

    img.onerror = function(){
        if(file.endsWith(".jpg")){
            img.src = base + file.replace(".jpg",".JPG");
        }else{
            img.src = base + file.replace(".JPG",".jpg");
        }
    };
}

// 🎮 بدء اللعبة
function startGame(){

    let lang = localStorage.getItem("lang") || "ar";
    let difficulty = document.getElementById("difficulty").value;

    current = data[Math.floor(Math.random()*data.length)];

    loadImage(current.file); // ✅ استبدلنا src

    correctAnswer=current.answers[lang]||"";

    let choicesCount = 3;
    if(difficulty==="medium") choicesCount = 4;
    if(difficulty==="hard") choicesCount = 6;

    generateChoices(lang, choicesCount);

    document.getElementById("hint").innerText =
        "عدد الحروف: "+correctAnswer.length;

    document.getElementById("result").innerText="";
    document.getElementById("nextBtn").classList.add("d-none");
}

// 🔘 اختيارات
function generateChoices(lang, count){

    let div=document.getElementById("choices");
    div.innerHTML="";

    let answers=[correctAnswer];

    while(answers.length < count){
        let r = data[Math.floor(Math.random()*data.length)].answers[lang];
        if(r && !answers.includes(r)) answers.push(r);
    }

    answers.sort(()=>Math.random()-0.5);

    answers.forEach(a=>{
        let btn=document.createElement("button");
        btn.className="btn btn-outline-primary choice";
        btn.innerText=a;
        btn.onclick=()=>checkAnswer(a);
        div.appendChild(btn);
    });
}

// ✅ تحقق
function checkAnswer(selected){

    let result=document.getElementById("result");
    let buttons=document.querySelectorAll(".choice");

    buttons.forEach(btn=>{
        btn.disabled=true;

        if(btn.innerText===correctAnswer){
            btn.classList.add("btn-success","glow","correct-anim");
        }

        if(btn.innerText===selected && selected!==correctAnswer){
            btn.classList.add("btn-danger","shake");
        }
    });

    if(selected===correctAnswer){
        result.innerText="✅ صحيح!";
        result.className="text-success";

        score++;
        correctSound.play();

        if(score % 5 === 0){
            level++;
        }

    }else{
        result.innerText="❌ خطأ!";
        result.className="text-danger";
        wrongSound.play();
    }

    localStorage.setItem("score", score);
    localStorage.setItem("level", level);

    updateScore();

    document.getElementById("nextBtn").classList.remove("d-none");
}

// 📊 تحديث
function updateScore(){
    document.getElementById("score").innerText="النقاط: "+score;
    document.getElementById("level").innerText="Level: "+level;
}

// 🔙 رجوع
function goBack(){
    window.location.href="index.html";
}

</script>

</body>
</html>
