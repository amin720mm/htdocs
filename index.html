<!DOCTYPE html>

<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الدراسة</title>

<link rel="stylesheet" href="css/bootstrap.min.css">

<style>
body {
    background: linear-gradient(135deg, #0d6efd, #6f42c1);
    min-height: 100vh;
}

/* 🔥 NAVBAR (إضافة فقط) */
.navbar-custom {
    position: fixed;
    top: 0;
    width: 100%;
    height: 65px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 15px;
    z-index: 9999;
}

.nav-logo {
    width: 45px;
    height: 45px;
    border-radius: 50%;
}

/* زر القائمة */
.menu-btn {
    font-size: 26px;
    color: white;
    background: none;
    border: none;
    cursor: pointer;
}

/* القائمة */
.dropdown-menu-custom {
    position: absolute;
    top: 70px;
    right: 15px;
    background: rgba(0,0,0,0.9);
    padding: 10px;
    border-radius: 10px;
    display: none;
}

.dropdown-menu-custom button {
    display: block;
    width: 100%;
    background: none;
    border: none;
    color: white;
    padding: 8px;
    text-align: left;
}

/* 🔥 LOGO أعلى اليسار */
.top-logo {
    position: fixed;
    top: 15px;
    left: 15px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    z-index: 1000;
    pointer-events: none;

    transition: all 0.3s ease;
}

/* 📱 حل الهاتف (مهم) */
@media (max-width: 768px) {
    .top-logo {
        display: none;
    }
}

/* 🔥 تأثير hover */
.top-logo:hover {
    transform: scale(1.2);
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

/* الكروت */
.card {
    cursor: pointer;
    transition: 0.3s;
}
.card:hover {
    transform: scale(1.05);
}

/* Contact Box */
.contact-box {
    margin-top: 30px;
    border-radius: 20px;
    padding: 20px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    color: white;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
}

.contact-box a {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 18px;
    background: #0d6efd;
    color: white;
    text-decoration: none;
    border-radius: 10px;
    font-weight: bold;
    transition: 0.3s;
}

.contact-box a:hover {
    background: #084298;
    transform: scale(1.05);
}

/* Footer VIP */
.footer-box {
    margin-top: 40px;
    border-radius: 25px;
    padding: 25px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    color: white;
}

.footer-box p {
    margin: 6px 0;
}

.signature {
    margin-top: 15px;
    padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.3);
    font-size: 14px;
    opacity: 0.9;
}

.signature span {
    font-weight: bold;
    color: #ffd700;
}

.footer-end {
    margin-top: 10px;
    font-weight: bold;
    color: #fff;
}

/* ✅ إصلاح الضغط */
.container {
    position: relative;
    z-index: 1;
}

/* مسافة بسبب navbar */
body {
    padding-top: 80px;
}
</style>

</head>

<body class="d-flex align-items-center justify-content-center">

<!-- 🔥 NAVBAR -->
<div class="navbar-custom">
    <img src="images/logoproject.jpg" class="nav-logo">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>

    <div class="dropdown-menu-custom" id="menu">
        <button onclick="alert('Login')">👤 Login</button>
        <button onclick="alert('Profile')">📁 Profile</button>
    </div>
</div>

<img src="images/logoproject.jpg" class="top-logo">

<div class="container text-center">

<div class="mb-3 text-white">
    <label class="me-2"><input type="radio" name="lang" value="fr"> Français</label>
    <label class="me-2"><input type="radio" name="lang" value="ar"> عربي</label>
    <label class="me-2"><input type="radio" name="lang" value="en"> English</label>
    <label class="me-2"><input type="radio" name="lang" value="nl"> Nederlands</label>
</div>

<h2 id="title" class="text-white mb-4">إختر التطبيق المناسب</h2>

<div class="row g-3">

<div class="col-12">
    <div class="card shadow-lg p-3 border-0" onclick="goToGame('gallery.html')">
        <h4 id="galleryTitle">🖼️ عرض كل الصور</h4>
        <p id="galleryDesc" class="text-muted">استكشف جميع الصور</p>
    </div>
</div>

<div class="col-6">
    <div class="card shadow p-3 border-0" onclick="goToGame('game2.html')">
        <h5 id="writeTitle">⌨️ الكتابة</h5>
        <small id="writeDesc">اختبر مهارتك</small>
    </div>
</div>

<div class="col-6">
    <div class="card shadow p-3 border-0" onclick="goToGame('game1.html')">
        <h5 id="imageTitle">🖼️ الصور</h5>
        <small id="imageDesc">تعلم بالصور</small>
    </div>
</div>

</div>

<!-- 🔥 Contact Section -->
<div class="contact-box">
    <h4 id="contactTitle">📩 تواصل معنا</h4>
    <p id="contactText">لأي اقتراح أو استفسار، يمكنك مراسلتنا عبر البريد الإلكتروني:</p>
    <a href="mailto:mohamed.amin@themanai.com" id="contactEmail">
        mohamed.amin@themanai.com
    </a>
</div>

<!-- 🔥 Footer -->

<div class="footer-box mt-4">
<p id="about1"></p>
<p id="about2"></p>
<p id="about3"></p>
<p id="about4"></p>
<div class="signature">المبرمج المناعي — Manai / Manaï</div>
<p id="about5" class="footer-end"></p>
</div>

</div>

<script src="js/bootstrap.bundle.min.js"></script>

<script>

// 🔥 MENU
function toggleMenu(){
    let menu=document.getElementById("menu");
    menu.style.display = (menu.style.display==="block")?"none":"block";
}

// إغلاق عند الضغط خارج
document.addEventListener("click", function(e){
    let menu=document.getElementById("menu");
    let btn=document.querySelector(".menu-btn");

    if(!menu.contains(e.target) && !btn.contains(e.target)){
        menu.style.display="none";
    }
});

// 🌍 الترجمات (كما هي بدون تغيير)
const translations = { ... نفس كودك بالكامل ... };

// باقي الكود بدون تغيير
</script>

</body>
</html>
