<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الدراسة</title>

<link rel="stylesheet" href="css/bootstrap.min.css">

<style>
body {
    background: linear-gradient(135deg, #0d6efd, #6f42c1);
    min-height: 100vh;
}

/* 🔥 Splash Screen */
#splash {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: linear-gradient(135deg, #0d6efd, #6f42c1);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

/* Logo */
.splash-logo {
    width:120px;
    height:120px;
    border-radius:20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    animation: zoomIn 1s ease;
}

@keyframes zoomIn {
    from { transform: scale(0.5); opacity:0; }
    to { transform: scale(1); opacity:1; }
}

/* اسم */
.splash-text {
    color:white;
    font-size:22px;
    margin-top:15px;
    letter-spacing:2px;
    animation: fadeUp 1s ease;
}

@keyframes fadeUp {
    from { transform:translateY(20px); opacity:0; }
    to { transform:translateY(0); opacity:1; }
}

/* 🔥 Loading Bar */
.loader {
    width:220px;
    height:8px;
    background: rgba(255,255,255,0.2);
    border-radius:10px;
    margin-top:25px;
    overflow:hidden;
}

.loader-bar {
    height:100%;
    width:0%;
    background: linear-gradient(90deg, #00f2fe, #ffd700);
    border-radius:10px;
    animation: load 3s ease forwards;
    box-shadow: 0 0 10px rgba(255,255,255,0.7);
}

@keyframes load {
    from { width:0%; }
    to { width:100%; }
}

/* الكروت */
.card {
    cursor: pointer;
    transition: 0.3s;
}
.card:hover {
    transform: scale(1.05);
}

/* Footer VIP */
.footer-box {
    margin-top: 40px;
    border-radius: 25px;
    padding: 25px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    color: white;
}

.footer-box p {
    margin: 6px 0;
}

.signature {
    margin-top: 15px;
    padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.3);
    font-size: 14px;
    opacity: 0.9;
}

.signature span {
    font-weight: bold;
    color: #ffd700;
}

.footer-end {
    margin-top: 10px;
    font-weight: bold;
    color: #fff;
}
</style>

</head>

<body class="d-flex align-items-center justify-content-center">

<!-- 🔥 Splash Screen -->
<div id="splash">
    <img src="images/Logo.JPG" class="splash-logo">
    <div class="splash-text">MANAI</div>

    <div class="loader">
        <div class="loader-bar"></div>
    </div>
</div>

<div class="container text-center">

<div class="mb-3 text-white">
    <label class="me-2"><input type="radio" name="lang" value="fr"> Français</label>
    <label class="me-2"><input type="radio" name="lang" value="ar"> عربي</label>
    <label class="me-2"><input type="radio" name="lang" value="en"> English</label>
    <label class="me-2"><input type="radio" name="lang" value="nl"> Nederlands</label>
</div>

<h2 id="title" class="text-white mb-4">إختر التطبيق المناسب</h2>

<div class="row g-3">

<div class="col-12">
    <div class="card shadow-lg p-3 border-0" onclick="goToGame('gallery.html')">
        <h4 id="galleryTitle">🖼️ عرض كل الصور</h4>
        <p id="galleryDesc" class="text-muted">استكشف جميع الصور</p>
    </div>
</div>

<div class="col-6">
    <div class="card shadow p-3 border-0" onclick="goToGame('game2.html')">
        <h5 id="writeTitle">⌨️ الكتابة</h5>
        <small id="writeDesc">اختبر مهارتك</small>
    </div>
</div>

<div class="col-6">
    <div class="card shadow p-3 border-0" onclick="goToGame('game1.html')">
        <h5 id="imageTitle">🖼️ الصور</h5>
        <small id="imageDesc">تعلم بالصور</small>
    </div>
</div>

</div>

<!-- 🔥 Footer مترجم -->
<div class="footer-box mt-4">
<p id="about1"></p>
<p id="about2"></p>
<p id="about3"></p>
<p id="about4"></p>
<div class="signature">المبرمج المناعي — Manai / Manaï</div>
<p id="about5" class="footer-end"></p>
</div>

</div>

<script src="js/bootstrap.bundle.min.js"></script>

<script>

// Splash
window.addEventListener("load", () => {
    setTimeout(()=>{
        document.getElementById("splash").style.display = "none";
    },3000);
});

// 🌍 الترجمات (🔥 تمت إضافة about)
const translations = {
    fr:{
        title:"Choisissez l'application",
        gallery:"🖼️ Voir toutes les images",
        galleryDesc:"Explorer toutes les images",
        write:"⌨️ Écriture",
        writeDesc:"Testez vos compétences",
        image:"🖼️ Images",
        imageDesc:"Apprendre avec les images",
        about1:"📚 Plateforme éducative gratuite",
        about2:"Créée comme hobby pour apprendre les langues",
        about3:"🌍 Projet open source",
        about4:"🤝 Le savoir pour tous",
        about5:"✨ Pour une vie meilleure"
    },
    ar:{
        title:"إختر التطبيق المناسب",
        gallery:"🖼️ عرض كل الصور",
        galleryDesc:"استكشف جميع الصور",
        write:"⌨️ الكتابة",
        writeDesc:"اختبر مهارتك",
        image:"🖼️ الصور",
        imageDesc:"تعلم بالصور",
        about1:"📚 موقع تعليمي غير ربحي",
        about2:"تم إنشاؤه كهواية لتعلم اللغات",
        about3:"🌍 مشروع مفتوح المصدر",
        about4:"🤝 المعرفة للجميع",
        about5:"✨ من أجل حياة أفضل"
    },
    en:{
        title:"Choose the application",
        gallery:"🖼️ View all images",
        galleryDesc:"Explore all images",
        write:"⌨️ Writing",
        writeDesc:"Test your skills",
        image:"🖼️ Images",
        imageDesc:"Learn with images",
        about1:"📚 Non-profit educational platform",
        about2:"Created as a hobby to learn languages",
        about3:"🌍 Open source project",
        about4:"🤝 Knowledge for everyone",
        about5:"✨ For a better life"
    },
    nl:{
        title:"Kies de applicatie",
        gallery:"🖼️ Bekijk alle afbeeldingen",
        galleryDesc:"Verken alle afbeeldingen",
        write:"⌨️ Schrijven",
        writeDesc:"Test je vaardigheden",
        image:"🖼️ Afbeeldingen",
        imageDesc:"Leren met afbeeldingen",
        about1:"📚 Gratis educatief platform",
        about2:"Gemaakt als hobby om talen te leren",
        about3:"🌍 Open source project",
        about4:"🤝 Kennis voor iedereen",
        about5:"✨ Voor een beter leven"
    }
};

// اللغة
function getLanguage(){
    return localStorage.getItem("lang") || "fr";
}

function saveLanguage(lang){
    localStorage.setItem("lang", lang);
}

// تطبيق
function applyTranslation(lang){
    let t = translations[lang];

    document.documentElement.lang = lang;
    document.body.dir = (lang==="ar")?"rtl":"ltr";

    document.getElementById("title").innerText=t.title;
    document.getElementById("galleryTitle").innerText=t.gallery;
    document.getElementById("galleryDesc").innerText=t.galleryDesc;
    document.getElementById("writeTitle").innerText=t.write;
    document.getElementById("writeDesc").innerText=t.writeDesc;
    document.getElementById("imageTitle").innerText=t.image;
    document.getElementById("imageDesc").innerText=t.imageDesc;

    document.getElementById("about1").innerText=t.about1;
    document.getElementById("about2").innerText=t.about2;
    document.getElementById("about3").innerText=t.about3;
    document.getElementById("about4").innerText=t.about4;
    document.getElementById("about5").innerText=t.about5;
}

// تغيير اللغة
document.querySelectorAll("input[name='lang']").forEach(r=>{
    r.addEventListener("change",e=>{
        saveLanguage(e.target.value);
        applyTranslation(e.target.value);
    });
});

// تحميل
function loadLanguage(){
    let lang=getLanguage();
    document.querySelector(`input[value="${lang}"]`).checked=true;
    applyTranslation(lang);
}

// تنقل
function goToGame(page){
    window.location.href=page;
}

window.onload=loadLanguage;

</script>

</body>
</html>
