<!DOCTYPE html>

<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الدراسة</title>

<link rel="stylesheet" href="css/bootstrap.min.css">

<style>
body {
    background: linear-gradient(135deg, #0d6efd, #6f42c1);
    min-height: 100vh;
    transition: background 0.4s, color 0.4s;
}

/* 🌙 DARK MODE */
.dark-mode {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
}

/* 🔥 NAVBAR */
.navbar-custom {
    position: fixed;
    top: 0;
    width: 100%;
    height: 65px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 15px;
    z-index: 9999;
}

/* LOGO */
.nav-logo {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    transition: 0.3s;
}
.nav-logo:hover {
    transform: scale(1.15);
}

/* MENU BUTTON */
.menu-btn {
    font-size: 24px;
    cursor: pointer;
    background: none;
    border: none;
    color: white;
}

/* DROPDOWN */
.dropdown-menu-custom {
    position: absolute;
    top: 70px;
    right: 15px;
    background: rgba(0,0,0,0.8);
    color: white;
    border-radius: 10px;
    padding: 10px;
    display: none;
    animation: fadeIn 0.3s ease;
}

.dropdown-menu-custom button {
    display: block;
    width: 100%;
    margin: 5px 0;
    background: none;
    border: none;
    color: white;
    text-align: left;
    cursor: pointer;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(-10px);}
    to {opacity:1; transform: translateY(0);}
}

/* 🔥 LOGO القديم */
.top-logo {
    display: none;
}

/* الكروت */
.card {
    cursor: pointer;
    transition: 0.3s;
}
.card:hover {
    transform: scale(1.05);
}

/* Contact Box */
.contact-box {
    margin-top: 30px;
    border-radius: 20px;
    padding: 20px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    color: white;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
}

.contact-box a {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 18px;
    background: #0d6efd;
    color: white;
    text-decoration: none;
    border-radius: 10px;
    font-weight: bold;
    transition: 0.3s;
}

.contact-box a:hover {
    background: #084298;
    transform: scale(1.05);
}

/* Footer */
.footer-box {
    margin-top: 40px;
    border-radius: 25px;
    padding: 25px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    color: white;
}

/* SPACE FIX */
body {
    padding-top: 80px;
}
</style>

</head>

<body class="d-flex align-items-center justify-content-center">

<!-- 🔥 NAVBAR -->
<div class="navbar-custom">
    <img src="images/logoproject.jpg" class="nav-logo">

    <button class="menu-btn" onclick="toggleMenu()">☰</button>

    <div class="dropdown-menu-custom" id="menu">
        <button onclick="toggleDark()">🌙 Dark / Light</button>
        <button onclick="login()">👤 Login</button>
        <button onclick="profile()">📁 Profile</button>
    </div>
</div>

<img src="images/logoproject.jpg" class="top-logo">

<div class="container text-center">

<div class="mb-3 text-white">
    <label class="me-2"><input type="radio" name="lang" value="fr"> Français</label>
    <label class="me-2"><input type="radio" name="lang" value="ar"> عربي</label>
    <label class="me-2"><input type="radio" name="lang" value="en"> English</label>
    <label class="me-2"><input type="radio" name="lang" value="nl"> Nederlands</label>
</div>

<h2 id="title" class="text-white mb-4">إختر التطبيق المناسب</h2>

<div class="row g-3">

<div class="col-12">
    <div class="card shadow-lg p-3 border-0" onclick="goToGame('gallery.html')">
        <h4 id="galleryTitle">🖼️ عرض كل الصور</h4>
        <p id="galleryDesc" class="text-muted">استكشف جميع الصور</p>
    </div>
</div>

<div class="col-6">
    <div class="card shadow p-3 border-0" onclick="goToGame('game2.html')">
        <h5 id="writeTitle">⌨️ الكتابة</h5>
        <small id="writeDesc">اختبر مهارتك</small>
    </div>
</div>

<div class="col-6">
    <div class="card shadow p-3 border-0" onclick="goToGame('game1.html')">
        <h5 id="imageTitle">🖼️ الصور</h5>
        <small id="imageDesc">تعلم بالصور</small>
    </div>
</div>

</div>

<!-- Contact -->
<div class="contact-box">
    <h4 id="contactTitle">📩 تواصل معنا</h4>
    <p id="contactText">لأي اقتراح أو استفسار، يمكنك مراسلتنا عبر البريد الإلكتروني:</p>
    <a href="mailto:mohamed.amin@themanai.com">
        mohamed.amin@themanai.com
    </a>
</div>

<!-- Footer -->
<div class="footer-box mt-4">
<p id="about1"></p>
<p id="about2"></p>
<p id="about3"></p>
<p id="about4"></p>
<div class="signature">المبرمج المناعي — Manai / Manaï</div>
<p id="about5" class="footer-end"></p>
</div>

</div>

<script src="js/bootstrap.bundle.min.js"></script>

<script>

// 🔥 MENU
function toggleMenu(){
    let menu=document.getElementById("menu");
    menu.style.display = (menu.style.display==="block")?"none":"block";
}

// 🌙 DARK MODE
function toggleDark(){
    document.body.classList.toggle("dark-mode");
}

// 👤 LOGIN
function login(){
    alert("Login system later 🔐");
}

// 📁 PROFILE
function profile(){
    alert("Profile page later 👤");
}

// 🌍 الترجمات (كما هي بدون تغيير)
const translations = { ... }; // (خليها كما هي عندك بدون تغيير)

function getLanguage(){
    return localStorage.getItem("lang") || "fr";
}

function saveLanguage(lang){
    localStorage.setItem("lang", lang);
}

function applyTranslation(lang){
    let t = translations[lang];

    document.documentElement.lang = lang;
    document.body.dir = (lang==="ar")?"rtl":"ltr";

    document.getElementById("title").innerText=t.title;
    document.getElementById("galleryTitle").innerText=t.gallery;
    document.getElementById("galleryDesc").innerText=t.galleryDesc;
    document.getElementById("writeTitle").innerText=t.write;
    document.getElementById("writeDesc").innerText=t.writeDesc;
    document.getElementById("imageTitle").innerText=t.image;
    document.getElementById("imageDesc").innerText=t.imageDesc;

    document.getElementById("about1").innerText=t.about1;
    document.getElementById("about2").innerText=t.about2;
    document.getElementById("about3").innerText=t.about3;
    document.getElementById("about4").innerText=t.about4;
    document.getElementById("about5").innerText=t.about5;

    document.getElementById("contactTitle").innerText=t.contactTitle;
    document.getElementById("contactText").innerText=t.contactText;
}

document.querySelectorAll("input[name='lang']").forEach(r=>{
    r.addEventListener("change",e=>{
        saveLanguage(e.target.value);
        applyTranslation(e.target.value);
    });
});

function loadLanguage(){
    let lang=getLanguage();
    document.querySelector(`input[value="${lang}"]`).checked=true;
    applyTranslation(lang);
}

function goToGame(page){
    sessionStorage.setItem("fromIndex", "true");
    window.location.href=page;
}

window.onload=loadLanguage;

</script>

</body>
</html>
