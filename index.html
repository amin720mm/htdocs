<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الدراسة</title>

<link rel="stylesheet" href="css/bootstrap.min.css">

<style>
body {
    background: linear-gradient(135deg, #0d6efd, #6f42c1);
    min-height: 100vh;
}

/* NAVBAR */
.navbar-custom {
    position: fixed;
    top: 0;
    width: 100%;
    height: 65px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 15px;
    z-index: 9999;
}

.nav-logo {
    width: 45px;
    height: 45px;
    border-radius: 50%;
}

.menu-btn {
    font-size: 26px;
    color: white;
    background: none;
    border: none;
    cursor: pointer;
}

.menu {
    position: absolute;
    top: 65px;
    right: 10px;
    background: rgba(0,0,0,0.9);
    border-radius: 10px;
    display: none;
    padding: 10px;
}

.menu button {
    display: block;
    width: 100%;
    background: none;
    border: none;
    color: white;
    padding: 8px;
}

/* LOGO */
.top-logo {
    position: fixed;
    top: 15px;
    left: 15px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    z-index: 1000;
}

/* الهاتف */
@media (max-width:768px){
    .top-logo{ display:none; }
}

/* cards */
.card {
    cursor: pointer;
    transition: 0.3s;
}
.card:hover {
    transform: scale(1.05);
}

.container {
    position: relative;
    z-index: 1;
    padding-top: 80px;
}

/* Contact */
.contact-box {
    margin-top: 30px;
    border-radius: 20px;
    padding: 20px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    color: white;
}

/* Footer */
.footer-box {
    margin-top: 40px;
    border-radius: 25px;
    padding: 25px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    color: white;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar-custom">
    <img src="images/logoproject.jpg" class="nav-logo">

    <button class="menu-btn" onclick="toggleMenu()">☰</button>

    <div class="menu" id="menu">
        <button onclick="alert('Login')">Login</button>
        <button onclick="alert('Profile')">Profile</button>
    </div>
</div>

<img src="images/logoproject.jpg" class="top-logo">

<div class="container text-center">

<div class="mb-3 text-white">
    <label><input type="radio" name="lang" value="fr"> Français</label>
    <label><input type="radio" name="lang" value="ar"> عربي</label>
    <label><input type="radio" name="lang" value="en"> English</label>
    <label><input type="radio" name="lang" value="nl"> Nederlands</label>
</div>

<h2 id="title" class="text-white mb-4">...</h2>

<div class="row g-3">

<div class="col-12">
<div class="card p-3" onclick="goToGame('gallery.html')">
<h4 id="galleryTitle"></h4>
<p id="galleryDesc"></p>
</div>
</div>

<div class="col-6">
<div class="card p-3" onclick="goToGame('game2.html')">
<h5 id="writeTitle"></h5>
<small id="writeDesc"></small>
</div>
</div>

<div class="col-6">
<div class="card p-3" onclick="goToGame('game1.html')">
<h5 id="imageTitle"></h5>
<small id="imageDesc"></small>
</div>
</div>

</div>

<div class="contact-box">
<h4 id="contactTitle"></h4>
<p id="contactText"></p>
<a href="mailto:mohamed.amin@themanai.com">
mohamed.amin@themanai.com
</a>
</div>

<div class="footer-box">
<p id="about1"></p>
<p id="about2"></p>
<p id="about3"></p>
<p id="about4"></p>
<p id="about5"></p>
</div>

</div>

<script>

/* MENU */
function toggleMenu(){
    let m=document.getElementById("menu");
    m.style.display = (m.style.display==="block")?"none":"block";
}

/* close menu */
document.addEventListener("click", function(e){
    let m=document.getElementById("menu");
    let b=document.querySelector(".menu-btn");
    if(!m.contains(e.target) && !b.contains(e.target)){
        m.style.display="none";
    }
});

/* TRANSLATIONS */
const translations = {
fr:{title:"Choisissez l'application",gallery:"Voir images",galleryDesc:"Explorer",write:"Écriture",writeDesc:"Test",image:"Images",imageDesc:"Apprendre",about1:"Plateforme",about2:"Hobby",about3:"Open source",about4:"Savoir",about5:"Vie meilleure",contactTitle:"Contact",contactText:"Email :"},
ar:{title:"إختر التطبيق",gallery:"عرض الصور",galleryDesc:"استكشاف",write:"الكتابة",writeDesc:"اختبار",image:"الصور",imageDesc:"تعلم",about1:"منصة",about2:"هواية",about3:"مفتوح",about4:"المعرفة",about5:"حياة أفضل",contactTitle:"تواصل",contactText:"راسلنا:"},
en:{title:"Choose app",gallery:"Images",galleryDesc:"Explore",write:"Writing",writeDesc:"Test",image:"Images",imageDesc:"Learn",about1:"Platform",about2:"Hobby",about3:"Open source",about4:"Knowledge",about5:"Better life",contactTitle:"Contact",contactText:"Email:"},
nl:{title:"Kies app",gallery:"Afbeeldingen",galleryDesc:"Verken",write:"Schrijven",writeDesc:"Test",image:"Afbeeldingen",imageDesc:"Leren",about1:"Platform",about2:"Hobby",about3:"Open source",about4:"Kennis",about5:"Beter leven",contactTitle:"Contact",contactText:"Email:"}
};

/* language */
function applyTranslation(lang){
    let t=translations[lang];

    document.getElementById("title").innerText=t.title;
    document.getElementById("galleryTitle").innerText=t.gallery;
    document.getElementById("galleryDesc").innerText=t.galleryDesc;
    document.getElementById("writeTitle").innerText=t.write;
    document.getElementById("writeDesc").innerText=t.writeDesc;
    document.getElementById("imageTitle").innerText=t.image;
    document.getElementById("imageDesc").innerText=t.imageDesc;

    document.getElementById("about1").innerText=t.about1;
    document.getElementById("about2").innerText=t.about2;
    document.getElementById("about3").innerText=t.about3;
    document.getElementById("about4").innerText=t.about4;
    document.getElementById("about5").innerText=t.about5;

    document.getElementById("contactTitle").innerText=t.contactTitle;
    document.getElementById("contactText").innerText=t.contactText;
}

/* radios */
document.querySelectorAll("input[name='lang']").forEach(r=>{
    r.addEventListener("change",e=>{
        localStorage.setItem("lang", e.target.value);
        applyTranslation(e.target.value);
    });
});

/* load */
window.onload=function(){
    let lang=localStorage.getItem("lang")||"fr";
    document.querySelector(`input[value="${lang}"]`).checked=true;
    applyTranslation(lang);
}

/* navigation */
function goToGame(page){
    window.location.href=page;
}

</script>

</body>
</html>
